<body class="bg-surface text-on-surface">
    <!-- Header Section (TopAppBar Shared Component) -->
    <header
        class="fixed top-0 w-full z-50 bg-[#f7f6f3]/70 dark:bg-stone-900/70 backdrop-blur-md flex items-center px-6 h-16 w-full">
        <div class="flex items-center w-full">
            <button class="p-2 hover:bg-[#f1f1ee]/50 transition-colors active:scale-95 duration-200 rounded-full mr-2">
                <span class="material-symbols-outlined text-[#65518a]">arrow_back</span>
            </button>
            <h1 class="font-['Plus_Jakarta_SANS'] font-semibold tracking-tight text-lg text-[#65518a]">新增產檢紀錄</h1>
        </div>
    </header>
    <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-8">
        <!-- Official Check-up Toggle Section -->
        <section class="flex items-center justify-between p-6 bg-secondary-container rounded-xl">
            <div class="space-y-1">
                <h3 class="font-headline font-bold text-on-secondary-container">正式產檢紀錄</h3>
                <p class="text-xs text-on-secondary-container/80">將此紀錄標記為正式產檢流程</p>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input checked="" class="sr-only peer" type="checkbox" value="" />
                <div
                    class="w-14 h-8 bg-surface-container-high peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary">
                </div>
            </label>
        </section>
        <!-- Vital Indicators Grid (Asymmetric Layout) -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <!-- Left Column: Weight & Height -->
            <div class="md:col-span-5 space-y-6">
                <div class="bg-surface-container-lowest p-6 rounded-xl custom-shadow space-y-4">
                    <label class="block text-sm font-medium text-on-surface-variant px-1">基本指標</label>
                    <div class="space-y-4">
                        <div class="relative">
                            <input
                                class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-primary focus:ring-2 focus:ring-primary-container transition-all"
                                placeholder="體重 (kg)" type="number" />
                            <span
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-sm">kg</span>
                        </div>
                        <div class="relative">
                            <input
                                class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-primary focus:ring-2 focus:ring-primary-container transition-all"
                                placeholder="身高 (cm)" type="number" />
                            <span
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-sm">cm</span>
                        </div>
                    </div>
                </div>
                <div class="bg-surface-container-lowest p-6 rounded-xl custom-shadow space-y-4">
                    <label class="block text-sm font-medium text-on-surface-variant px-1">胎心率</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-primary focus:ring-2 focus:ring-primary-container transition-all"
                            placeholder="FHR" type="number" />
                        <span
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 text-sm font-medium">bpm</span>
                    </div>
                </div>
            </div>
            <!-- Right Column: Blood Pressure & Lab Results -->
            <div class="md:col-span-7 space-y-6">
                <div class="bg-surface-container-lowest p-6 rounded-xl custom-shadow space-y-4">
                    <label class="block text-sm font-medium text-on-surface-variant px-1">血壓數據</label>
                    <div class="flex gap-4">
                        <div class="flex-1 space-y-2">
                            <span class="text-[10px] text-on-surface-variant uppercase tracking-wider pl-1">收縮壓
                                (Sys)</span>
                            <input
                                class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-primary focus:ring-2 focus:ring-primary-container transition-all"
                                placeholder="120" type="number" />
                        </div>
                        <div class="flex-1 space-y-2">
                            <span class="text-[10px] text-on-surface-variant uppercase tracking-wider pl-1">舒張壓
                                (Dia)</span>
                            <input
                                class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-primary focus:ring-2 focus:ring-primary-container transition-all"
                                placeholder="80" type="number" />
                        </div>
                    </div>
                </div>
                <div class="bg-surface-container-lowest p-6 rounded-xl custom-shadow space-y-4">
                    <label class="block text-sm font-medium text-on-surface-variant px-1">尿液與水腫檢查</label>
                    <div class="space-y-3">
                        <select
                            class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-on-surface-variant focus:ring-2 focus:ring-primary-container appearance-none">
                            <option value="">蛋白尿 (Proteinuria)</option>
                            <option value="-">- (陰性)</option>
                            <option value="+">+ (陽性)</option>
                            <option value="++">++ (強陽性)</option>
                        </select>
                        <select
                            class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-on-surface-variant focus:ring-2 focus:ring-primary-container appearance-none">
                            <option value="">尿糖 (Glycosuria)</option>
                            <option value="-">- (陰性)</option>
                            <option value="+">+ (陽性)</option>
                        </select>
                        <select
                            class="w-full bg-surface-container-low border-none rounded-md px-4 py-4 text-on-surface-variant focus:ring-2 focus:ring-primary-container appearance-none">
                            <option value="">水腫狀況 (Edema)</option>
                            <option value="無">無水腫</option>
                            <option value="輕微">輕微 (+)</option>
                            <option value="明顯">明顯 (++)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <!-- Daily Vibe Section -->

            <h2 class="text-xl font-headline font-bold text-primary">今日心情與狀態</h2>
            <div class="bg-white rounded-xl p-6 space-y-8 shadow-sm">

                    <p class="text-xs font-label font-bold text-on-surface-variant uppercase tracking-wider">今日心情 (請選擇)

                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">

                            <span class="text-[11px] font-bold text-primary">平靜</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">😴</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">疲倦</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🤰</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">有感</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🤯</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">壓力</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">⚡</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">活力</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">😵‍💫</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">頭暈</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🥺</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">感性</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🥳</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">興奮</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🤔</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">思考</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🥰</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">幸福</span>
                        </button>
                        <button class="flex flex-col items-center gap-1.5 group">
                            <span
                                class="text-3xl bg-surface-container-low w-14 h-14 flex items-center justify-center rounded-2xl group-hover:bg-primary-container/20 transition-all border-2 border-transparent">🤢</span>
                            <span
                                class="text-[11px] font-medium text-on-surface-variant group-hover:text-primary">噁心</span>
                        </button>
                    </div>
                </div>
                <div class="space-y-4">
                    <p class="text-xs font-label font-bold text-on-surface-variant uppercase tracking-wider">身體狀況 (可複選)
                    </p>
                    <div class="flex flex-wrap gap-3">
                        <button
                            class="px-6 py-3 bg-primary text-white rounded-full text-sm font-semibold flex items-center gap-2 shadow-md">
                            <span class="material-symbols-outlined text-sm">check</span>
                            食慾良好
                        </button>
                        <button
                            class="px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary-container/30 transition-colors">腰痠</button>
                        <button
                            class="px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary-container/30 transition-colors">睡眠不足</button>
                        <button
                            class="px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary-container/30 transition-colors">頻尿</button>
                        <button
                            class="px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary-container/30 transition-colors">水腫</button>
                        <button
                            class="px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary-container/30 transition-colors">抽筋</button>
                        <button
                            class="px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary-container/30 transition-colors">脹氣</button>
                        <button
                            class="px-6 py-3 bg-tertiary-container/40 text-on-tertiary-container rounded-full text-sm font-bold border border-tertiary-container/60">+
                            新增標籤</button>

                </div>
                <div class="space-y-2">
                    <label class="text-xs font-label font-bold text-on-surface-variant uppercase tracking-wider">生活筆記 /
                        紀錄</label>
                    <textarea
                        class="w-full bg-surface-container-low border-none rounded-2xl p-4 h-32 focus:ring-2 focus:ring-primary-container text-on-surface resize-none"
                        placeholder="記錄下這幾天的感受、飲食或寶寶的胎動..."></textarea>
                </div>
            </div>
        </section>
        <!-- Visual Record -->
        <section class="space-y-4">
            <h2 class="text-xl font-headline font-bold text-primary">超音波與日期</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Date Selector -->
                <div class="bg-white rounded-xl p-6 flex items-center gap-4 shadow-sm border border-transparent">
                    <div
                        class="w-12 h-12 bg-tertiary-container rounded-lg flex flex-col items-center justify-center text-on-tertiary-container">
                        <span class="text-[10px] font-bold">JUNE</span>
                        <span class="text-xl font-headline font-black">12</span>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold mb-1">紀錄日期</p>
                        <input
                            class="text-xs text-on-surface-variant bg-transparent border-none p-0 focus:ring-0 w-full"
                            type="date" value="2024-06-12" />
                    </div>
                </div>
                <!-- Upload Area -->
                <div
                    class="bg-secondary-container/10 border-2 border-dashed border-secondary-container rounded-xl p-6 flex flex-col items-center justify-center gap-2 group cursor-pointer hover:bg-secondary-container/20 transition-all aspect-video md:aspect-auto">
                    <span
                        class="material-symbols-outlined text-secondary text-3xl group-hover:scale-110 transition-transform">add_a_photo</span>
                    <p class="text-sm font-bold text-secondary">上傳超音波照</p>
                    <p class="text-[10px] text-secondary/60">點擊或拖曳檔案至此</p>
                </div>
            </div>
        </section>
        <!-- Save Button -->
        <div class="pt-8 pb-12">
            <button onclick="window.location.href='pregnancyrecord.html'"
                class="w-full py-5 bg-[#65518a] text-white rounded-xl font-headline font-bold text-lg shadow-[0_20px_40px_rgba(101,81,138,0.15)] active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">check_circle</span>

            </button>

        </div>

        class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#f7f6f3]/80 backdrop-blur-xl shadow-[0_-10px_40px_rgba(46,47,45,0.04)] rounded-t-[3rem] z-50">
        <a class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:bg-[#f1f1ee] rounded-full active:scale-90 transition-all duration-300"

        <a class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:bg-[#f1f1ee] rounded-full active:scale-90 transition-all duration-300"

            <span class="material-symbols-outlined">trending_up</span>
            <span class="font-['Be_Vietnam_Pro'] text-[11px] font-medium mt-1">成長</span>
        </a>
        <a class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:bg-[#f1f1ee] rounded-full active:scale-90 transition-all duration-300"
            href="#">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="font-['Be_Vietnam_Pro'] text-[11px] font-medium mt-1">知識</span>

        <a class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:bg-[#f1f1ee] rounded-full active:scale-90 transition-all duration-300"
