{% load socialaccount %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>登入</title>
    <link rel="icon" href="static/media/LOGO.png" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script>
    function handleGoogleError(errorDetails) {
        console.error("!!! Google 登入元件發生錯誤 !!!");
        console.error("錯誤詳細資訊 (errorDetails):", errorDetails);
        // 有些錯誤會包含 type，例如 'idpiframe_initialization_failed'
        alert("Google 登入初始化或執行失敗，錯誤類型: " + (errorDetails.type || "未知") + "\n請打開瀏覽器 F12 Console 查看詳細原因。");
    }
    </script>

    <script src="https://accounts.google.com/gsi/client" defer></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#65518a",
                        "primary-container": "#d6beff",
                        "secondary": "#2f6275",
                        "secondary-container": "#b2e4fb",
                        "background": "#f7f6f3",
                        "surface": "#f7f6f3",
                        "on-surface": "#2e2f2d",
                        "on-surface-variant": "#5b5c5a",
                        "outline": "#767775",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f1ee",
                        "surface-container-high": "#e3e3df",
                        "surface-container-highest": "#ddddd9",
                        "surface-container": "#e8e8e5",
                        "error": "#b41340",
                        "error-container": "#f74b6d",
                        "line-green": "#06C755",
                        "line-green-hover": "#05b34c"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f6f3; color: #2e2f2d; overflow-x: hidden; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
    {% if request.GET.notice == 'login_required' %}
    <script>
        alert('請先登入');
        if (window.history && window.history.replaceState) {
            const url = new URL(window.location.href);
            url.searchParams.delete('notice');
            window.history.replaceState({}, '', url.toString());
        }
    </script>
    {% endif %}

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-container/40 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-secondary-container/40 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

    <main class="w-full max-w-md px-6 py-12 relative z-10 flex flex-col items-center">
        <div class="flex flex-col items-center gap-3 mb-10">
            <div class="w-16 h-16 bg-surface-container-lowest rounded-2xl shadow-sm flex items-center justify-center border border-primary/10">
                <img src="/logo/LOGO.png" alt="CoLoGrowth LOGO" class="h-8 w-auto object-contain" />
            </div>
            <h1 class="text-3xl font-bold text-primary font-headline tracking-tight">CoLoGrowth</h1>
            <p class="text-sm font-medium text-on-surface-variant">專為媽咪與寶寶打造的智能紀錄本</p>
        </div>

        <div class="w-full bg-surface-container-lowest rounded-3xl p-10 shadow-[0_20px_40px_rgba(46,47,45,0.06)] border border-surface-container-low flex flex-col items-center text-center">

            <h2 class="text-2xl font-bold text-on-surface mb-3 tracking-tight">歡迎回來</h2>
            <p class="text-sm font-medium text-on-surface-variant mb-10 leading-relaxed">
                為了提供更便捷與安全的服務<br>CoLoGrowth 支援以下帳號快捷登入
            </p>

            <div class="w-full flex flex-col items-center gap-4">

                <div id="g_id_onload"
                    data-client_id="1005276403057-p67ocf8c13e5121akigm7sq93l7db7s2.apps.googleusercontent.com"
                    data-login_uri="{{ request.scheme }}://{{ request.get_host }}/google_auth_login"
                    data-error_callback="handleGoogleError"
                    data-ux_mode="redirect"
                    data-use_fedcm_for_prompt="false">
                </div>
                <div class="w-full flex justify-center">
                    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-shape="pill" data-text="signin_with" data-logo_alignment="left" data-width="360"></div>
                </div>

                <a href="{% provider_login_url 'line' %}" style="width:360px;" class="flex items-center justify-center gap-3 px-6 py-2.5 bg-line-green hover:bg-line-green-hover text-white font-medium rounded-full transition-all duration-200 shadow-sm border border-transparent">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
                        <path d="M24 10.304c0-5.231-5.384-9.489-12-9.489s-12 4.258-12 9.489c0 4.69 4.27 8.632 10.035 9.379.39.084.922.258 1.057.593.12.3.078.766.038 1.067l-.164 1.021c-.049.303-.24 1.185 1.031.647 1.272-.538 6.848-4.032 9.34-6.9a8.9 8.9 0 0 0 2.663-6.227zm-15.53 3.491H6.945a.436.436 0 0 1-.436-.435v-4.14a.436.436 0 0 1 .436-.436h.5c.241 0 .436.195.436.436v3.204h.593a.436.436 0 0 1 .436.436v.44a.437.437 0 0 1-.436.435zm1.884-.435a.436.436 0 0 1-.436.435h-.5a.436.436 0 0 1-.436-.435v-4.14a.436.436 0 0 1 .436-.436h.5c.24 0 .435.195.435.436v4.14zm4.195 0a.437.437 0 0 1-.365.428c-.144.024-.593.064-.99-.272l-1.956-2.502v2.346a.436.436 0 0 1-.436.435h-.44a.436.436 0 0 1-.436-.435v-4.14a.436.436 0 0 1 .436-.436h.464c.182 0 .346.103.424.267l1.849 2.378V9.22a.436.436 0 0 1 .436-.436h.44a.436.436 0 0 1 .436.436v4.14zm3.931-2.285h-1.393v.819h1.393a.436.436 0 0 1 .436.435v.44a.436.436 0 0 1-.436.436h-2.329a.436.436 0 0 1-.436-.436v-4.14a.436.436 0 0 1 .436-.436h2.329a.436.436 0 0 1 .436.436v.44a.436.436 0 0 1-.436.435h-1.393v.75h1.393a.436.436 0 0 1 .436.435v.44a.436.436 0 0 1-.436.436z"/>
                    </svg>
                    <span>使用 LINE 帳號登入</span>
                </a>

            </div>

            <div class="mt-8">
                <p class="text-[11px] text-on-surface-variant/70">
                    點擊登入即表示您同意 CoLoGrowth 的<br><a href="#" class="underline hover:text-primary transition-colors">服務條款</a> 與 <a href="#" class="underline hover:text-primary transition-colors">隱私權政策</a>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
