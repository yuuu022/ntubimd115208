{% extends 'base/base.html' %}
{% load static %}
{% block title %}修改個人資料{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/user/edit_userprofile.css' %}">
{% endblock %}
{% block content %}
<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Header Section -->
    <header class="sticky top-0 z-50 bg-[#f7f6f3]/70 backdrop-blur-md rounded-b-[3rem] shadow-[0_20px_40px_rgba(46,47,45,0.06)] flex justify-between items-center px-6 py-4 w-full transition-all duration-500 md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-surface-container-low transition-colors active:scale-95 duration-200 rounded-full cursor-pointer">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-headline font-semibold tracking-tight text-lg text-primary">修改個人資料</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-4 mx-auto max-w-md md:max-w-none w-full md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <form onsubmit="event.preventDefault(); window.location.href='userprofile.html';" class="space-y-6">

            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-[20px]">person</span>
                    </div>
                    <h2 class="font-headline font-bold text-lg">基本資料</h2>
                </div>

                <div class="space-y-5">
                    <!-- 頭像編輯 -->
                    <div class="flex flex-col items-center gap-3 pb-2">
                        <div class="relative group cursor-pointer">
                            <div class="w-24 h-24 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest shadow-sm">
                                <span class="material-symbols-outlined text-primary text-4xl">face_3</span>
                            </div>
                            <div class="absolute bottom-0 right-0 w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center shadow-md border-2 border-surface-container-lowest group-hover:scale-110 transition-transform">
                                <span class="material-symbols-outlined text-[16px]">photo_camera</span>
                            </div>
                        </div>
                        <span class="text-xs font-bold text-primary cursor-pointer hover:underline">更換大頭貼</span>
                    </div>

                    <!-- 姓名 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">媽媽姓名 / 暱稱</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">badge</span>
                            <input type="text" required value="林曉美" placeholder="請輸入姓名或暱稱" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium placeholder:text-on-surface-variant/40" />
                        </div>
                    </div>

                    <!-- 電子郵件 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">電子郵件 (Email)</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">mail</span>
                            <input type="email" required value="xiaomei.lin@example.com" placeholder="請輸入電子郵件" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium placeholder:text-on-surface-variant/40" />
                        </div>
                    </div>
                </div>
            </section>



            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-headline font-bold text-base shadow-[0_10px_20px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all mt-6 cursor-pointer flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">check_circle</span>
                儲存修改
            </button>
        </form>
    </main>
{% endblock %}
