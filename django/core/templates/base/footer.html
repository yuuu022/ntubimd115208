<nav class="fixed bottom-0 left-0 w-full md:w-full flex justify-around items-center px-4 pb-3 pt-2 bg-[#f7f6f3]/80 backdrop-blur-xl z-50 shadow-[0_-10px_40px_rgba(46,47,45,0.06)] md:bottom-0 md:rounded-none md:pt-3 md:pb-3 md:shadow-2xl md:border md:border-surface-container-high/50 transition-all duration-500">
    <a data-nav="home" href="/{% if active_selection_query %}?{{ active_selection_query }}{% endif %}" class="flex w-[64px] h-[48px] flex-col items-center justify-center text-[#5b5c5a] hover:text-[#65518a] transition-opacity footer">
        <span class="material-symbols-outlined">home</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">首頁</span>
    </a>
    <a data-nav="record" href="/pregnancyrecord/{% if active_selection_query %}?{{ active_selection_query }}{% endif %}" class="flex w-[64px] h-[48px] flex-col items-center justify-center text-[#5b5c5a] hover:text-[#65518a] transition-opacity footer">
        <span class="material-symbols-outlined">edit_note</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">紀錄</span>
    </a>
    <a data-nav="growth" href="/babyinformation/{% if active_selection_query %}?{{ active_selection_query }}{% endif %}" class="flex w-[64px] h-[48px] flex-col items-center justify-center text-[#5b5c5a] hover:text-[#65518a] transition-opacity footer">
        <span class="material-symbols-outlined">auto_graph</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">成長</span>
    </a>
    <a data-nav="knowledge" href="/qa/?new=true" class="flex w-[64px] h-[48px] flex-col items-center justify-center text-[#5b5c5a] hover:text-[#65518a] transition-opacity footer">
        <span class="material-symbols-outlined">menu_book</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">Growth AI</span>
    </a>
    <a data-nav="profile" href="/userprofile/{% if active_selection_query %}?{{ active_selection_query }}{% endif %}" class="flex w-[64px] h-[48px] flex-col items-center justify-center text-[#5b5c5a] hover:text-[#65518a] transition-opacity footer">
        <span class="material-symbols-outlined">person_2</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">個人</span>
    </a>
</nav>

<script>
    (() => {
        const navLinks = Array.from(document.querySelectorAll('a[data-nav]'));

        if (!navLinks.length) {
            return;
        }

        const navMatchers = {
            home: (location) => (
                location.pathname === '/' ||
                location.pathname.startsWith('/add_care_reminder') ||
                location.pathname.startsWith('/set_care_status')
            ),
            record: (location) => (
                location.pathname.startsWith('/pregnancyrecord/')||
                location.pathname.startsWith('/pregnancyrecord/add/') ||
                location.pathname.startsWith('/pregnancyrecord_new/')||
                location.pathname.startsWith('/pregnancycase/')||
                location.pathname.startsWith('/add_pregnancy_baby/')||
                location.pathname.startsWith('/edit_pregnancy_case/')

            ),
            growth: (location) => (
                location.pathname.startsWith('/babyinformation/')|
                location.pathname.startsWith('/add_baby_information/') ||
                location.pathname.startsWith('/add_baby_record/')||
                location.pathname.startsWith('/babyrecord/<int:babyrecord_id>/edit/')||
                location.pathname.startsWith('/babyrecord/<int:babyrecord_id>/delete/')||
                location.pathname.startsWith('/edit_baby_information/')||
                location.pathname.startsWith('/babygrowthmap/')
        ),
            knowledge: (location) => location.pathname.startsWith('/qa/'),
            profile: (location) => (
                location.pathname.startsWith('/userprofile/')||
                location.pathname.startsWith('/edit_userprofile/')||
                location.pathname.startsWith('/edit_family_member/')||
                location.pathname.startsWith('/join_family/')
        ),
        };

        const setActiveLink = (activeLink) => {
            navLinks.forEach((link) => {
                const isActive = link === activeLink;
                link.classList.toggle('footer-nav-active', isActive);

                if (isActive) {
                    link.setAttribute('aria-current', 'page');
                } else {
                    link.removeAttribute('aria-current');
                }
            });
        };

        const currentLink = navLinks.find((link) => {
            const matcher = navMatchers[link.dataset.nav];
            return matcher ? matcher(window.location) : false;
        });

        setActiveLink(currentLink || navLinks[0]);

        navLinks.forEach((link) => {
            link.addEventListener('click', () => {
                setActiveLink(link);
            });
        });
    })();
</script>
