<!DOCTYPE html>
{% load static %}

<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>修改成長紀錄 - AuraLink</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/baby/edit_baby_record.css' %}" />
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
</head>

<body class="bg-surface text-on-surface">
    <!-- Header Section (TopAppBar Shared Component) -->
    <main class="pt-24 pb-32 px-6 max-w-2xl md:max-w-none mx-auto space-y-8 md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <form method="post" action="{% url 'edit_baby_record' record.babyrecord_id %}" enctype="multipart/form-data">
            {% csrf_token %}
                <!-- Upload Area -->
        <div class="space-y-4">
            <label class="flex items-center gap-2 text-sm font-bold text-on-surface-variant px-1">
                <span class="material-symbols-outlined text-base">photo_camera</span>
                現有照片
            </label>
            {% if record.photo %}
            <div class="bg-surface-container-lowest rounded-[2rem] overflow-hidden shadow-sm">
                <img src="{{ record.photo }}" alt="現有成長照片" class="w-full h-64 object-cover" />
            </div>
            {% else %}
            <div class="bg-surface-container-lowest rounded-[2rem] h-64 flex items-center justify-center text-on-surface-variant text-sm">
                尚未上傳照片
            </div>
            {% endif %}
        </div>

        <!-- Date Selector -->
        <div class="space-y-3">
            <label class="flex items-center gap-2 text-sm font-medium text-on-surface-variant px-1">
                <span class="material-symbols-outlined text-base">calendar_today</span>
                紀錄日期
            </label>
            <div class="relative w-full">
                <input name="date" class="w-full bg-surface-container-low bg-none border-none rounded-2xl px-6 py-4 text-on-surface font-semibold focus:ring-2 focus:ring-primary-container transition-all appearance-none" type="date" value="{{ form_data.date|default:record.date|date:'Y-m-d' }}" />
            </div>
        </div>
        <div class="space-y-3">
            <label class="flex items-center gap-2 text-sm font-medium text-on-surface-variant px-1">
                <span class="material-symbols-outlined text-base">photo_camera</span>
                上傳照片
            </label>
            <input name="photo" type="file" accept="image/*" class="w-full rounded-2xl border-none bg-surface-container-low px-4 py-3 text-on-surface" />
        </div>

        <!-- Vital Indicators Grid (2x2) -->
        <div class="space-y-3">
            <label class="block text-sm font-medium text-on-surface-variant px-1">成長指標</label>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#d6beff4d] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-[#65518a]/80">身高 (CM)</span>
                    <input name="height" class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-[#65518a] w-full focus:ring-0 placeholder:text-[#65518a]/30" type="number" step="0.1" min="0" placeholder="0.0" value="{{ form_data.height|default:record.height }}" />
                </div>
                <div class="bg-[#d6beff4d] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-[#65518a]/80">體重 (KG)</span>
                    <input name="weight" class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-[#65518a] w-full focus:ring-0 placeholder:text-[#65518a]/30" type="number" step="0.1" min="0" placeholder="0.0" value="{{ form_data.weight|default:record.weight }}" />
                </div>
                <div class="bg-[#d6beff4d] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-[#65518a]/80">頭圍 (CM)</span>
                    <input name="headcircumference" class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-[#65518a] w-full focus:ring-0 placeholder:text-[#65518a]/30" type="number" step="0.1" min="0" placeholder="0.0" value="{{ form_data.headcircumference|default:record.headcircumference }}" />
                </div>
                <div class="bg-[#d6beff4d] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-[#65518a]/80">胸圍 (CM)</span>
                    <input name="chestcircumference" class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-[#65518a] w-full focus:ring-0 placeholder:text-[#65518a]/30" type="number" step="0.1" min="0" placeholder="0.0" value="{{ form_data.chestcircumference|default:record.chestcircumference }}" />
                </div>
            </div>
        </div>

        <!-- Milestones Section -->
        <div class="space-y-4">
            <label class="block text-sm font-medium text-on-surface-variant px-1">重要里程碑</label>
            <input id="milestones" type="hidden" name="milestones" value="{{ selected_milestones|default:'' }}" />
            <div class="flex flex-wrap gap-3 milestone-buttons">
                {% for ms in all_milestones %}
                <button type="button" class="milestone-item px-6 py-3 bg-surface-container-low text-on-surface-variant rounded-full text-sm font-medium hover:bg-primary/10 transition-all cursor-pointer">
                    {{ ms.growthrecord }}
                </button>
                {% empty %}
                <p class="text-xs text-on-surface-variant">暫無里程碑可供選擇，請先執行導入腳本。</p>
                {% endfor %}
            </div>
        </div>

        <!-- Notes Section -->
        <div class="space-y-4">
            <label class="block text-sm font-medium text-on-surface-variant px-1">成長筆記</label>
            <textarea name="record" class="w-full bg-surface-container-lowest border-none rounded-[2rem] p-6 h-40 focus:ring-2 focus:ring-primary-container text-on-surface resize-none custom-shadow placeholder:text-on-surface-variant/40 placeholder:font-medium" placeholder="寫下對嬰幼兒的心情或今天發生的趣事...">{{ form_data.record }}</textarea>
        </div>

        <!-- Save Button -->
        <div class="pt-8 pb-12">
            <button type="submit" class="w-full py-4 bg-[#65518a] text-white rounded-full font-headline font-bold text-lg shadow-[0_20px_40px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all">
                完成並儲存紀錄
            </button>
        </div>
            </form>
    </main>
    <!-- BottomNavBar -->
    <nav class="fixed bottom-0 left-0 w-full md:w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#f7f6f3]/80 backdrop-blur-xl z-50 rounded-t-[3rem] shadow-[0_-10px_40px_rgba(46,47,45,0.06)] md:bottom-0 md:rounded-none md:pt-4 md:pb-4 md:shadow-2xl md:border md:border-surface-container-high/50 transition-all duration-500 ">
    <a href="index.html" class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:text-[#65518a] transition-opacity">
        <span class="material-symbols-outlined">home</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">首頁</span>
    </a>
    <a href="pregnancyrecord.html" class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:text-[#65518a] transition-opacity">
        <span class="material-symbols-outlined">edit_note</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">紀錄</span>
    </a>
    <a href="babyinformation.html" class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:text-[#65518a] transition-opacity">
        <span class="material-symbols-outlined">auto_graph</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">成長</span>
    </a>
    <a href="qa_conversation.html" class="flex flex-col items-center justify-center text-[#5b5c5a] px-5 py-2 hover:text-[#65518a] transition-opacity">
        <span class="material-symbols-outlined">menu_book</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">知識</span>
    </a>
    <a href="userprofile.html" class="flex flex-col items-center justify-center bg-[#d6beff] text-[#65518a] rounded-[1.5rem] px-5 py-2 scale-90 transition-transform duration-300">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person_2</span>
        <span class="font-['Be_Vietnam_Pro'] text-[10px] font-medium mt-1">個人</span>
    </a>
</nav>
    <!-- Baby Switcher Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const switcherBtn = document.getElementById('baby-switcher-btn');
            const switcherMenu = document.getElementById('baby-switcher-menu');
            
            if (switcherBtn && switcherMenu) {
                switcherBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = !switcherMenu.classList.contains('opacity-0');
                    if (isOpen) {
                        switcherMenu.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                        switcherMenu.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                    } else {
                        switcherMenu.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                        switcherMenu.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!switcherBtn.contains(e.target) && !switcherMenu.contains(e.target)) {
                        switcherMenu.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                        switcherMenu.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                    }
                });
            }
        });
    </script>

    <!-- Growth Record Interactions Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const milestonesInput = document.getElementById('milestones');
            const milestoneButtons = document.querySelectorAll('.milestone-item');

            const updateMilestones = () => {
                const selected = Array.from(milestoneButtons)
                    .filter(btn => btn.dataset.active === 'true')
                    .map(btn => btn.textContent.trim());
                if (milestonesInput) {
                    milestonesInput.value = selected.join('|');
                }
            };

            milestoneButtons.forEach(button => {
                const isActive = button.classList.contains('bg-[#d6beff80]');
                button.dataset.active = isActive ? 'true' : 'false';
                button.addEventListener('click', () => {
                    const active = button.dataset.active !== 'true';
                    button.dataset.active = active ? 'true' : 'false';
                    button.classList.toggle('bg-[#d6beff80]', active);
                    button.classList.toggle('text-[#65518a]', active);
                    button.classList.toggle('bg-surface-container-low', !active);
                    button.classList.toggle('text-on-surface-variant', !active);
                    updateMilestones();
                });
            });

            if (milestonesInput && milestonesInput.value) {
                const selectedValues = milestonesInput.value.split('|').map(value => value.trim());
                milestoneButtons.forEach(button => {
                    if (selectedValues.includes(button.textContent.trim())) {
                        button.dataset.active = 'true';
                        button.classList.add('bg-[#d6beff80]', 'text-[#65518a]');
                        button.classList.remove('bg-surface-container-low', 'text-on-surface-variant');
                    }
                });
            }

            // Mood Selector Interaction
            const moodContainer = document.querySelector('.flex.items-center.justify-around.bg-surface-container-lowest');
            if (moodContainer) {
                const moodBtns = moodContainer.querySelectorAll('button');
                moodBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        // Reset all to inactive
                        moodBtns.forEach(b => {
                            b.className = 'text-4xl hover:scale-110 active:scale-95 transition-transform grayscale opacity-60 flex items-center justify-center';
                            const dot = b.querySelector('.absolute');
                            if (dot) dot.remove();
                        });
                        // Set clicked to active
                        btn.className = 'text-[2.75rem] scale-110 shadow-sm transition-transform relative flex items-center justify-center';
                        const emojiText = Array.from(btn.childNodes).find(n => n.nodeType === Node.TEXT_NODE).textContent.trim();
                        btn.innerHTML = `${emojiText}<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-primary rounded-full"></div>`;
                    });
                });
            }
        });
    </script>
</body>

</html>
