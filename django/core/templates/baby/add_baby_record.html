{% extends 'base/base.html' %}
{% load static %}
{% block title %}新增成長記錄{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/baby/add_baby_record.css' %}">
{% endblock %}
{% block content %}
<body class="bg-surface text-on-surface">
    <!-- Header Section (TopAppBar Shared Component) -->
    <header
        class="justify-between fixed top-0 w-full z-50 bg-[#f7f6f3]/70 dark:bg-stone-900/70 backdrop-blur-md flex items-center px-6 h-16 w-full">
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='babyinformation.html'" class="p-2 hover:bg-[#f1f1ee]/50 transition-colors active:scale-95 duration-200 rounded-full mr-2">
                <span class="material-symbols-outlined text-[#65518a]">arrow_back</span>
            </button>
            <h1 class="font-['Plus_Jakarta_SANS'] font-semibold tracking-tight text-lg text-[#65518a]">新增成長紀錄</h1>
        </div>
            <div class="flex items-center gap-3 relative">
                                    <!-- Baby Switcher Button -->
            <button id="baby-switcher-btn" class="flex items-center gap-1.5 bg-primary/10 px-3 py-1.5 rounded-full hover:bg-primary/20 transition-colors cursor-pointer group">
                <div class="w-5 h-5 rounded-full bg-white flex items-center justify-center shrink-0 shadow-sm group-hover:scale-105 transition-transform">
                    <span class="material-symbols-outlined text-primary text-[14px]">face</span>
                </div>
                <span class="text-[13px] font-bold text-primary">小寶</span>
                <span class="material-symbols-outlined text-primary text-[18px]">swap_horiz</span>
            </button>
            <!-- Dropdown Menu -->
            <div id="baby-switcher-menu" class="absolute top-full right-0 mt-2 w-40 bg-white rounded-2xl shadow-xl border border-surface-container-high overflow-hidden opacity-0 pointer-events-none transition-all duration-200 z-50 transform origin-top-right scale-95">
                <div class="max-h-56 overflow-y-auto hide-scrollbar flex flex-col">
                    <button class="w-full text-left px-4 py-3 bg-primary/5 flex items-center justify-between border-b border-surface-container-highest cursor-pointer">
                        <span class="text-sm font-bold text-primary">小寶</span>
                        <span class="material-symbols-outlined text-primary text-[16px]">check</span>
                    </button>
                    <button class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors flex items-center justify-between border-b border-surface-container-highest cursor-pointer">
                        <span class="text-sm font-bold text-on-surface">大寶</span>
                    </button>
                    <button onclick="window.location.href='add_pregnancy_baby.html'" class="w-full text-left px-4 py-3 hover:bg-primary/5 transition-colors flex items-center gap-2 cursor-pointer">
                        <span class="material-symbols-outlined text-[16px] text-primary">pregnant_woman</span>
                        <span class="text-[13px] font-bold text-primary">新增胎數與小孩</span>
                    </button>
                </div>
            </div>
    </header>
    <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-8">

        <!-- Upload Area -->
        <div class="bg-surface-container-lowest border-2 border-dashed border-primary-container rounded-[2rem] p-8 flex flex-col items-center justify-center gap-3 cursor-pointer hover:bg-primary/5 transition-all aspect-[4/3] md:aspect-video shadow-sm">
            <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                <span class="material-symbols-outlined text-2xl">photo_camera</span>
            </div>
            <p class="text-sm font-bold text-on-surface-variant">點擊上傳成長照片</p>
        </div>

        <!-- Date Selector -->
        <div class="space-y-3">
            <label class="flex items-center gap-2 text-sm font-bold text-on-surface-variant px-1">
                <span class="material-symbols-outlined text-base">calendar_today</span>
                紀錄日期
            </label>
            <div class="relative w-full">
                <input class="w-full bg-surface-container-low border-none rounded-2xl px-6 py-4 text-on-surface font-semibold focus:ring-2 focus:ring-primary-container transition-all appearance-none" type="date" value="2023-10-24" />
                <span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
            </div>
        </div>

        <!-- Vital Indicators Grid (2x2) -->
        <div class="space-y-3">
            <label class="block text-sm font-bold text-on-surface-variant px-1">成長指標</label>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-[#ebf4fa] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-on-surface-variant/80">身高 (CM)</span>
                    <input class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-on-surface/50 w-full focus:ring-0 placeholder:text-on-surface/30" type="number" placeholder="0.0" />
                </div>
                <div class="bg-[#eaf6f9] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-on-surface-variant/80">體重 (KG)</span>
                    <input class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-on-surface/50 w-full focus:ring-0 placeholder:text-on-surface/30" type="number" placeholder="0.0" />
                </div>
                <div class="bg-[#ebf4fa] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-on-surface-variant/80">頭圍 (CM)</span>
                    <input class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-on-surface/50 w-full focus:ring-0 placeholder:text-on-surface/30" type="number" placeholder="0.0" />
                </div>
                <div class="bg-[#eaf6f9] p-5 rounded-3xl relative flex flex-col justify-center items-center gap-2 h-24">
                    <span class="text-[10px] font-bold text-on-surface-variant/80">胸圍 (CM)</span>
                    <input class="bg-transparent text-center border-none p-0 text-3xl font-headline font-bold text-on-surface/50 w-full focus:ring-0 placeholder:text-on-surface/30" type="number" placeholder="0.0" />
                </div>
            </div>
        </div>

        <!-- Milestones Section -->
        <div class="space-y-4">
            <label class="block text-sm font-bold text-on-surface-variant px-1">重要里程碑</label>
            <div class="flex flex-wrap gap-3">
                <button class="px-5 py-2.5 bg-primary text-white rounded-full text-xs font-bold transition-all shadow-sm">第一次翻身</button>
                <button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full text-xs font-bold hover:bg-primary/10 transition-all">第一顆牙齒</button>
                <button class="px-5 py-2.5 bg-primary text-white rounded-full text-xs font-bold transition-all shadow-sm">會坐了</button>
                <button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full text-xs font-bold hover:bg-primary/10 transition-all">會爬了</button>
                <button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full text-xs font-bold hover:bg-primary/10 transition-all">開口叫媽媽</button>
                <button class="px-5 py-2.5 bg-surface-container-low text-on-surface-variant rounded-full text-xs font-bold hover:bg-primary/10 transition-all">踏出第一步</button>
            </div>
        </div>



        <!-- Notes Section -->
        <div class="space-y-4">
            <label class="block text-sm font-bold text-on-surface-variant px-1">成長筆記</label>
            <textarea class="w-full bg-surface-container-lowest border-none rounded-[2rem] p-6 h-40 focus:ring-2 focus:ring-primary-container text-on-surface resize-none custom-shadow placeholder:text-on-surface-variant/40 placeholder:font-medium" placeholder="寫下對寶寶的心情或今天發生的趣事..."></textarea>
        </div>

        <!-- Save Button -->
        <div class="pt-8 pb-12">
            <button onclick="window.location.href='/babyinformation/'" class="w-full py-4 bg-[#65518a] text-white rounded-full font-headline font-bold text-lg shadow-[0_20px_40px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all">
                完成並儲存紀錄
            </button>
        </div>

    </main>
    {% endblock %}
