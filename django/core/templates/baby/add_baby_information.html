{% extends 'base/base.html' %}
{% load static %}
{% block title %}新增嬰幼兒資訊{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/baby/add_baby_profile.css' %}">
{% endblock %}
{% block content %}
<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Header Section -->
    <header class="justify-between fixed top-0 w-full z-50 bg-[#f7f6f3]/70 backdrop-blur-md flex items-center px-6 h-16 w-full shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-surface-container-low transition-colors active:scale-95 duration-200 rounded-full cursor-pointer">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-headline font-semibold tracking-tight text-lg text-primary">新增嬰幼兒資訊</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-4 mx-auto max-w-md md:max-w-2xl lg:max-w-3xl w-full">
        <form onsubmit="event.preventDefault(); window.history.back();" class="space-y-6">

            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-[20px]">child_care</span>
                    </div>
                    <h2 class="font-headline font-bold text-lg">嬰幼兒基本資料</h2>
                </div>

                <div class="space-y-5">
                    <!-- 嬰兒暱稱 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">嬰兒暱稱</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">face</span>
                            <input type="text" name="baby_name" value="{{ baby_form.baby_name }}" required placeholder="例如：小寶、球球" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium placeholder:text-on-surface-variant/40" />
                        </div>
                    </div>

                    <!-- 出生時間與週數 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生時間</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">event</span>
                                <input type="datetime-local" name="birthdaytime" value="{{ baby_form.birthdaytime_value }}" class="w-full bg-surface-container-low border-none rounded-xl pl-11 pr-3 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生時週數</label>
                            <div class="relative">
                                <input type="number" name="birth_week" min="20" max="45" value="{{ baby_form.birth_week_number }}" placeholder="週數" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium placeholder:text-on-surface-variant/40" />
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">週</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 bg-secondary/10 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-secondary text-[20px]">monitor_weight</span>
                    </div>
                    <h2 class="font-headline font-bold text-lg text-secondary">出生體徵紀錄</h2>
                </div>

                <div class="grid grid-cols-2 gap-4 gap-y-5">
                    <!-- 出生體重 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生體重</label>
                        <div class="relative">
                            <input type="number" name="birth_weight" step="0.1" value="{{ baby_form.birth_weight }}" placeholder="如 3200" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-secondary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">g</span>
                        </div>
                    </div>

                    <!-- 出生身長 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生身長</label>
                        <div class="relative">
                            <input type="number" name="birth_height" step="0.1" value="{{ baby_form.birth_height }}" placeholder="如 50.5" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-secondary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">cm</span>
                        </div>
                    </div>

                    <!-- 出生頭圍 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生頭圍</label>
                        <div class="relative">
                            <input type="number" name="birth_head" step="0.1" value="{{ baby_form.birth_head }}" placeholder="如 34" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-secondary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">cm</span>
                        </div>
                    </div>

                    <!-- 出生胸圍 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生胸圍</label>
                        <div class="relative">
                            <input type="number" name="birth_chest" step="0.1" value="{{ baby_form.birth_chest }}" placeholder="如 32" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-secondary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">cm</span>
                        </div>
                    </div>
                </div>

                <div class="mt-5 space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">生產方式</label>
                    <div class="relative">
                        <select name="production_method" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-secondary-container transition-all text-sm outline-none font-medium appearance-none">
                            <option value="" disabled {% if not baby_form.production_method %}selected{% endif %}>請選擇生產方式</option>
                            <option value="自然產" {% if baby_form.production_method == '自然產' %}selected{% endif %}>自然產</option>
                            <option value="剖腹產" {% if baby_form.production_method == '剖腹產' %}selected{% endif %}>剖腹產</option>
                            <option value="無痛分娩" {% if baby_form.production_method == '無痛分娩' %}selected{% endif %}>無痛分娩自然產</option>
                            <option value="水中生產" {% if baby_form.production_method == '水中生產' %}selected{% endif %}>水中生產</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
                    </div>
                </div>
            </section>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-headline font-bold text-base shadow-[0_10px_20px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all mt-6 cursor-pointer flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">check_circle</span>
                儲存嬰幼兒資訊
            </button>
        </form>
    </main>
{% endblock %}
