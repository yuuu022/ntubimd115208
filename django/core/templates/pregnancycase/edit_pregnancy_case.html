{% extends 'base/base.html' %}
{% load static %}
{% block title %}編輯懷孕胎數{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pregnancycase/edit_pregnancy_case.css' %}">
{% endblock %}
{% block content %}
<div class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Title Section -->
    <div class="flex justify-between items-center px-6 py-4 w-full md:px-8 lg:px-16 xl:px-32 2xl:px-64 mt-4">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-surface-container-low transition-colors active:scale-95 duration-200 rounded-full cursor-pointer">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-headline font-extrabold text-2xl text-primary tracking-tight">編輯懷孕胎數</h1>
        </div>
        <button onclick="if(confirm('確定要刪除此胎數紀錄嗎？此動作無法復原。')) window.location.href='{% url 'pregnancy_case' %}?delete_id={{ case.pregnancycase_id }}';" class="text-primary font-bold text-sm hover:bg-primary/10 px-3 py-1.5 rounded-full transition-colors cursor-pointer flex items-center gap-1">
            <span class="material-symbols-outlined text-[18px]">delete</span>
            刪除
        </button>
    </div>

    <!-- Main Content -->
    <main class="pt-4 px-4 mx-auto max-w-md md:max-w-none w-full md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <form method="post" action="{% url 'edit_pregnancy_case' %}?id={{ case.pregnancycase_id }}" class="space-y-6">
            {% csrf_token %}

            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <span class="material-symbols-outlined text-primary">pregnant_woman</span>
                    <h2 class="font-headline font-bold text-lg">懷孕資訊</h2>
                </div>

                <div class="space-y-5">
                    <!-- 胎次名稱 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">胎次名稱 (選填)</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">label</span>
                            <input type="text" name="baby_name" value="{{ baby_name }}" placeholder="例如：大寶、二寶" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                        </div>
                    </div>

                    <!-- 最後月經日期 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">最後月經日期</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">event</span>
                            <input type="date" name="menstruation" value="{{ menstruation_str }}" required class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                        </div>
                    </div>

                    <!-- 預產期 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">預產期 (自動計算或手動填寫)</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">calendar_today</span>
                            <input type="date" name="expecteddate" value="{{ expecteddate_str }}" required class="w-full bg-primary/5 border border-primary/20 rounded-xl pl-12 pr-4 py-3.5 text-primary focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-bold" />
                        </div>
                    </div>

                    <!-- 加入碼 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">加入碼 (供其他家人綁定)</label>
                        <div class="relative flex items-center">
                            <span class="material-symbols-outlined absolute left-4 text-on-surface-variant/50">qr_code</span>
                            <input type="text" name="code" value="{{ case.code }}" readonly class="w-full bg-surface-container-low/50 border-none rounded-xl pl-12 pr-12 py-3.5 text-on-surface text-sm outline-none font-bold tracking-widest" />
                            <button type="button" class="absolute right-3 p-1.5 text-primary hover:bg-primary/10 rounded-full transition-colors cursor-pointer" onclick="alert('已複製加入碼！')">
                                <span class="material-symbols-outlined text-[18px]">content_copy</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-headline font-bold text-base shadow-[0_10px_20px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all mt-6 cursor-pointer flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">save</span>
                儲存變更
            </button>
        </form>
    </main>
</div>
{% endblock %}
