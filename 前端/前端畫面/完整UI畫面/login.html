<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>登入 - AuraLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#65518a",
                        "primary-container": "#d6beff",
                        "secondary": "#65518a",
                        "secondary-container": "#b2e4fb",
                        "background": "#f7f6f3",
                        "surface": "#f7f6f3",
                        "on-surface": "#2e2f2d",
                        "on-surface-variant": "#5b5c5a",
                        "outline": "#767775",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f1ee",
                        "surface-container-high": "#e3e3df",
                        "surface-container-highest": "#ddddd9",
                        "surface-container": "#e8e8e5",
                        "error": "#65518a",
                        "error-container": "#f74b6d",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f6f3; color: #2e2f2d; overflow-x: hidden; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    
        /* Hide number spinner */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary-container/40 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-primary-container/40 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

    <main class="w-full max-w-md px-6 py-12 relative z-10 flex flex-col items-center">
        <!-- Logo Section -->
        <div class="flex flex-col items-center gap-3 mb-10">
            <div class="w-16 h-16 bg-surface-container-lowest rounded-2xl shadow-sm flex items-center justify-center border border-primary/10">
                <span class="material-symbols-outlined text-[#65518a] text-4xl" data-icon="child_care">child_care</span>
            </div>
            <h1 class="text-3xl font-bold text-primary font-headline tracking-tight">AuraLink</h1>
            <p class="text-sm font-medium text-on-surface-variant">專為媽咪與寶寶打造的智能紀錄本</p>
        </div>

        <!-- Login Form Container -->
        <div class="w-full bg-surface-container-lowest rounded-3xl p-10 shadow-[0_20px_40px_rgba(46,47,45,0.06)] border border-surface-container-low flex flex-col items-center text-center">
            
            <h2 class="text-2xl font-bold text-on-surface mb-3 tracking-tight">歡迎回來</h2>
            <p class="text-sm font-medium text-on-surface-variant mb-10 leading-relaxed">
                為了提供更便捷與安全的服務<br>AuraLink 支援使用 LINE 快速登入
            </p>

            <div class="w-full flex flex-col gap-4">
                <button type="button" onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-3 py-4 px-4 bg-[#06C755] rounded-2xl text-white font-bold text-[15px] hover:bg-[#05b34c] hover:scale-[1.02] active:scale-95 transition-all shadow-sm cursor-pointer">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current" xmlns="http://www.w3.org/2000/svg">
                        <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 3.55 8.845 8.636 9.608.339.073.797.228.914.524.104.267.068.68.032.966-.036.286-.239 1.439-.289 1.713-.086.463-.4.606.322.215.719-.39 3.882-2.285 5.313-3.924C21.849 16.591 24 13.684 24 10.304zM7.554 13.045H5.068c-.28 0-.507-.227-.507-.507V8.07c0-.281.227-.508.507-.508.281 0 .508.227.508.508v3.961h1.978c.28 0 .508.227.508.507 0 .28-.228.507-.508.507zm3.176 0H9.715c-.28 0-.507-.227-.507-.507V8.07c0-.281.227-.508.507-.508.281 0 .508.227.508.508v4.468c0 .28-.227.507-.508.507zm5.275 0h-1.015c-.28 0-.507-.227-.507-.507v-2.316l-2.023 2.721c-.049.065-.116.115-.192.146-.076.031-.161.041-.242.028-.081-.013-.156-.048-.216-.101-.06-.053-.105-.122-.128-.198-.023-.076-.023-.158 0-.234.023-.076.068-.145.128-.198l2.024-2.721v-1.088c0-.281.227-.508.508-.508.28 0 .507.227.507.508v4.468c0 .28-.227.507-.507.507zm4.195-2.029c0 .28-.227.507-.507.507H18.42c-.28 0-.507-.227-.507-.507V8.07c0-.281.227-.508.507-.508.281 0 .508.227.508.508v2.438h2.072c.28 0 .507.227.507.507z"/>
                    </svg>
                    使用 LINE 登入
                </button>
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-outline-variant/30"></div>
                    <span class="flex-shrink-0 mx-4 text-outline text-xs font-medium">或</span>
                    <div class="flex-grow border-t border-outline-variant/30"></div>
                </div>
                <button type="button" onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-2 py-4 px-4 bg-primary text-white rounded-2xl font-bold text-[15px] hover:bg-primary/90 hover:scale-[1.02] active:scale-95 transition-all shadow-sm cursor-pointer">
                    <span class="material-symbols-outlined text-xl">person_add</span>
                    註冊新帳號
                </button>
            </div>
            
            <div class="mt-8">
                <p class="text-[11px] text-on-surface-variant/70">
                    點擊登入即表示您同意 AuraLink 的<br><a href="#" class="underline hover:text-primary transition-colors">服務條款</a> 與 <a href="#" class="underline hover:text-primary transition-colors">隱私權政策</a>
                </p>
            </div>
        </div>
    </main>
</body>
</html>
