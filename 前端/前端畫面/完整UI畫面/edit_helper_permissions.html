<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>修改協助者權限 - AuraLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#65518a",
                        "primary-container": "#d6beff",
                        "secondary": "#65518a",
                        "secondary-container": "#b2e4fb",
                        "background": "#f7f6f3",
                        "surface": "#f7f6f3",
                        "on-surface": "#2e2f2d",
                        "on-surface-variant": "#5b5c5a",
                        "outline": "#767775",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f1ee",
                        "surface-container-high": "#e3e3df",
                        "surface-container-highest": "#ddddd9",
                        "error": "#65518a",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f6f3; color: #2e2f2d; overflow-x: hidden; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Header Section -->
    <header class="justify-between fixed top-0 w-full z-50 bg-[#f7f6f3]/70 backdrop-blur-md flex items-center px-6 h-16 w-full shadow-sm md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-surface-container-low transition-colors active:scale-95 duration-200 rounded-full cursor-pointer">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-headline font-semibold tracking-tight text-lg text-primary">修改協助者權限</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-4 mx-auto max-w-md md:max-w-none w-full md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <form onsubmit="event.preventDefault(); window.location.href='userprofile.html';" class="space-y-6">
            
            <!-- Target Helper Info -->
            <button type="button" id="helper-selector-btn" class="w-full text-left bg-primary/5 hover:bg-primary/10 transition-colors rounded-3xl p-6 flex items-center gap-4 border border-primary/10 cursor-pointer group relative overflow-hidden">
                <div class="w-14 h-14 bg-primary/10 text-primary rounded-full flex items-center justify-center font-bold text-xl shrink-0 group-hover:scale-105 transition-transform">
                    <span id="current-helper-icon" class="material-symbols-outlined text-[28px]">face</span>
                </div>
                <div class="flex flex-col flex-1">
                    <span class="text-sm font-bold text-on-surface-variant uppercase tracking-wider mb-1">正在設定權限給</span>
                    <span class="text-xl font-bold text-primary flex items-center gap-2">
                        <span id="current-helper-name">張偉明</span> 
                        <span id="current-helper-role" class="text-sm font-medium text-on-surface-variant">(爸爸)</span>
                    </span>
                </div>
            </button>

            <!-- Permissions Section -->
            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-[20px]">vpn_key</span>
                    </div>
                    <h2 class="font-headline font-bold text-lg text-primary">功能權限設定</h2>
                </div>

                <div class="space-y-6">
                    <!-- Feature 1: 小孩紀錄 -->
                    <div class="flex flex-col gap-3">
                        <label class="text-sm font-bold text-on-surface flex items-center gap-2">
                            <span class="material-symbols-outlined text-on-surface-variant text-[18px]">child_care</span>
                            小孩紀錄
                        </label>
                        <div class="flex bg-surface-container-low rounded-xl p-1 w-full relative">
                            <!-- 3 Segmented buttons -->
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">關閉</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">檢視</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white text-primary shadow-sm border border-surface-container-highest cursor-pointer">修改</button>
                        </div>
                    </div>

                    <!-- Feature 2: 媽媽紀錄 -->
                    <div class="flex flex-col gap-3">
                        <label class="text-sm font-bold text-on-surface flex items-center gap-2">
                            <span class="material-symbols-outlined text-on-surface-variant text-[18px]">pregnant_woman</span>
                            媽媽紀錄
                        </label>
                        <div class="flex bg-surface-container-low rounded-xl p-1 w-full relative">
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">關閉</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white text-primary shadow-sm border border-surface-container-highest cursor-pointer">檢視</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">修改</button>
                        </div>
                    </div>

                    <!-- Feature 3: 協助者清單 -->
                    <div class="flex flex-col gap-3">
                        <label class="text-sm font-bold text-on-surface flex items-center gap-2">
                            <span class="material-symbols-outlined text-on-surface-variant text-[18px]">group</span>
                            協助者清單
                        </label>
                        <div class="flex bg-surface-container-low rounded-xl p-1 w-full relative">
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white text-primary shadow-sm border border-surface-container-highest cursor-pointer">關閉</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">檢視</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">修改</button>
                        </div>
                    </div>

                    <!-- Feature 4: 成長趨勢 -->
                    <div class="flex flex-col gap-3">
                        <label class="text-sm font-bold text-on-surface flex items-center gap-2">
                            <span class="material-symbols-outlined text-on-surface-variant text-[18px]">auto_graph</span>
                            成長趨勢
                        </label>
                        <div class="flex bg-surface-container-low rounded-xl p-1 w-full relative">
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">關閉</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-white text-primary shadow-sm border border-surface-container-highest cursor-pointer">檢視</button>
                            <button type="button" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all text-on-surface-variant hover:bg-surface-container-high/50 cursor-pointer">修改</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-headline font-bold text-base shadow-[0_10px_20px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all mt-6 cursor-pointer flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">check_circle</span>
                儲存權限
            </button>
        </form>
    </main>
    
    </main>
    
    <!-- Helper Selector Modal -->
    <div id="helper-modal" class="fixed inset-0 z-[60] flex items-end sm:items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        <!-- Backdrop -->
        <div id="helper-modal-backdrop" class="absolute inset-0 bg-on-surface/40 backdrop-blur-sm transition-opacity duration-300"></div>
        
        <!-- Modal Content -->
        <div id="helper-modal-content" class="relative w-full max-w-md bg-surface-container-lowest rounded-t-[2rem] sm:rounded-3xl shadow-2xl transform translate-y-full sm:translate-y-4 sm:scale-95 transition-all duration-300 flex flex-col max-h-[85vh]">
            <!-- Handle for mobile -->
            <div class="w-full flex justify-center pt-3 pb-1 sm:hidden">
                <div class="w-12 h-1.5 bg-outline-variant/30 rounded-full"></div>
            </div>
            
            <div class="p-6 pb-4 border-b border-surface-container-high/50 flex justify-between items-center shrink-0">
                <h3 class="font-headline font-bold text-lg text-primary">挑選協助者</h3>
                <button type="button" id="close-helper-modal" class="w-8 h-8 rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high flex items-center justify-center transition-colors cursor-pointer">
                    <span class="material-symbols-outlined text-xl">close</span>
                </button>
            </div>
            
            <div class="p-4 overflow-y-auto hide-scrollbar flex flex-col gap-2">
                <!-- Helper 1 -->
                <button type="button" class="helper-option w-full flex items-center justify-between p-4 bg-primary/5 border border-primary/20 rounded-2xl transition-colors cursor-pointer" data-name="張偉明" data-role="(爸爸)" data-icon="face">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-primary/10 text-primary rounded-full flex items-center justify-center font-bold text-lg">
                            <span class="material-symbols-outlined text-[22px]">face</span>
                        </div>
                        <div class="flex flex-col text-left">
                            <span class="text-sm font-bold text-primary">張偉明</span>
                            <span class="text-[10px] font-bold text-primary/70 uppercase tracking-wider mt-0.5">爸爸 (共同管理者)</span>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-primary check-icon">check_circle</span>
                </button>
                
                <!-- Helper 2 -->
                <button type="button" class="helper-option w-full flex items-center justify-between p-4 bg-surface-container-low/50 hover:bg-surface-container-low rounded-2xl transition-colors cursor-pointer" data-name="阿嬤 (淑芬)" data-role="(阿嬤)" data-icon="face_3">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-primary/10 text-primary rounded-full flex items-center justify-center font-bold text-lg">
                            <span class="material-symbols-outlined text-[22px]">face_3</span>
                        </div>
                        <div class="flex flex-col text-left">
                            <span class="text-sm font-bold text-on-surface">阿嬤 (淑芬)</span>
                            <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-wider mt-0.5">阿嬤 (僅檢視)</span>
                        </div>
                    </div>
                    <span class="material-symbols-outlined text-transparent check-icon">check_circle</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Script for handling segmented control clicks and modal selection -->
    <script>
        document.querySelectorAll('.bg-surface-container-low.rounded-xl').forEach(group => {
            const buttons = group.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Reset all buttons in group
                    buttons.forEach(b => {
                        b.classList.remove('bg-white', 'text-primary', 'shadow-sm', 'border', 'border-surface-container-highest');
                        b.classList.add('text-on-surface-variant', 'hover:bg-surface-container-high/50');
                    });
                    // Set active state for clicked button
                    btn.classList.add('bg-white', 'text-primary', 'shadow-sm', 'border', 'border-surface-container-highest');
                    btn.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-high/50');
                });
            });
        });

        // Modal Logic
        const helperBtn = document.getElementById('helper-selector-btn');
        const helperModal = document.getElementById('helper-modal');
        const helperModalBackdrop = document.getElementById('helper-modal-backdrop');
        const helperModalContent = document.getElementById('helper-modal-content');
        const closeHelperModal = document.getElementById('close-helper-modal');
        const helperOptions = document.querySelectorAll('.helper-option');
        
        const currentHelperName = document.getElementById('current-helper-name');
        const currentHelperRole = document.getElementById('current-helper-role');
        const currentHelperIcon = document.getElementById('current-helper-icon');

        function openModal() {
            helperModal.classList.remove('opacity-0', 'pointer-events-none');
            helperModal.classList.add('opacity-100', 'pointer-events-auto');
            
            // Animation for modal content
            setTimeout(() => {
                helperModalContent.classList.remove('translate-y-full', 'sm:translate-y-4', 'sm:scale-95');
                helperModalContent.classList.add('translate-y-0', 'sm:translate-y-0', 'sm:scale-100');
            }, 10);
        }

        function closeModal() {
            helperModalContent.classList.remove('translate-y-0', 'sm:translate-y-0', 'sm:scale-100');
            helperModalContent.classList.add('translate-y-full', 'sm:translate-y-4', 'sm:scale-95');
            
            setTimeout(() => {
                helperModal.classList.remove('opacity-100', 'pointer-events-auto');
                helperModal.classList.add('opacity-0', 'pointer-events-none');
            }, 300);
        }

        helperBtn.addEventListener('click', openModal);
        closeHelperModal.addEventListener('click', closeModal);
        helperModalBackdrop.addEventListener('click', closeModal);

        helperOptions.forEach(option => {
            option.addEventListener('click', () => {
                // Update styling for all options
                helperOptions.forEach(opt => {
                    opt.classList.remove('bg-primary/5', 'border-primary/20', 'border');
                    opt.classList.add('bg-surface-container-low/50', 'hover:bg-surface-container-low', 'border-transparent');
                    
                    const nameSpan = opt.querySelector('.text-sm');
                    nameSpan.classList.remove('text-primary');
                    nameSpan.classList.add('text-on-surface');
                    
                    const roleSpan = opt.querySelector('.text-\\[10px\\]');
                    roleSpan.classList.remove('text-primary/70');
                    roleSpan.classList.add('text-on-surface-variant');
                    
                    const checkIcon = opt.querySelector('.check-icon');
                    checkIcon.classList.remove('text-primary');
                    checkIcon.classList.add('text-transparent');
                });

                // Set styling for selected option
                option.classList.remove('bg-surface-container-low/50', 'hover:bg-surface-container-low', 'border-transparent');
                option.classList.add('bg-primary/5', 'border-primary/20', 'border');
                
                const nameSpan = option.querySelector('.text-sm');
                nameSpan.classList.remove('text-on-surface');
                nameSpan.classList.add('text-primary');
                
                const roleSpan = option.querySelector('.text-\\[10px\\]');
                roleSpan.classList.remove('text-on-surface-variant');
                roleSpan.classList.add('text-primary/70');
                
                const checkIcon = option.querySelector('.check-icon');
                checkIcon.classList.remove('text-transparent');
                checkIcon.classList.add('text-primary');

                // Update main button display
                currentHelperName.textContent = option.dataset.name;
                currentHelperRole.textContent = option.dataset.role;
                currentHelperIcon.textContent = option.dataset.icon;

                // Provide haptic feedback
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(50);
                }
                
                setTimeout(() => {
                    closeModal();
                }, 150);
            });
        });
    </script>
</body>
</html>
