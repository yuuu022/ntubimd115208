<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>編輯寶寶資料 - AuraLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#65518a",
                        "primary-container": "#d6beff",
                        "secondary": "#65518a",
                        "secondary-container": "#b2e4fb",
                        "background": "#f7f6f3",
                        "surface": "#f7f6f3",
                        "on-surface": "#2e2f2d",
                        "on-surface-variant": "#5b5c5a",
                        "outline": "#767775",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f1ee",
                        "surface-container-high": "#e3e3df",
                        "surface-container-highest": "#ddddd9",
                        "error": "#65518a",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f6f3; color: #2e2f2d; overflow-x: hidden; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    
        /* Hide number spinner */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Header Section -->
    <header class="justify-between fixed top-0 w-full z-50 bg-[#f7f6f3]/70 backdrop-blur-md flex items-center px-6 h-16 w-full shadow-sm md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-surface-container-low transition-colors active:scale-95 duration-200 rounded-full cursor-pointer">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-headline font-semibold tracking-tight text-lg text-primary">編輯寶寶資料</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-4 mx-auto max-w-md md:max-w-none w-full md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <form onsubmit="event.preventDefault(); window.history.back();" class="space-y-6">
            
            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-[20px]">child_care</span>
                    </div>
                    <h2 class="font-headline font-bold text-lg">寶寶基本資料</h2>
                </div>

                <div class="space-y-5">
                    <!-- 嬰兒暱稱 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">嬰兒暱稱</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">face</span>
                            <input type="text" value="小橘子" required placeholder="例如：小寶、球球" class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium placeholder:text-on-surface-variant/40" />
                        </div>
                    </div>

                    <!-- 出生時間與週數 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生時間</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">event</span>
                                <input type="datetime-local" value="2023-10-15T08:45" class="w-full bg-surface-container-low border-none rounded-xl pl-11 pr-3 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生時週數</label>
                            <div class="relative">
                                <input type="number" min="20" max="45" value="39" placeholder="週數" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium placeholder:text-on-surface-variant/40" />
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">週</span>
                            </div>
                        </div>
                    </div>

                    <!-- 胎次與胎兒數 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">胎次</label>
                            <div class="relative">
                                <input type="number" min="1" max="10" value="1" placeholder="第幾胎" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">胎兒數</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50">child_care</span>
                                <select class="w-full bg-surface-container-low bg-none border-none rounded-xl pl-11 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium appearance-none">
                                    <option value="1" selected>單胞胎</option>
                                    <option value="2">雙胞胎</option>
                                    <option value="3">三胞胎或以上</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 加入碼 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1 flex justify-between items-center">
                            <span>加入碼 (分享給其他照顧者)</span>
                        </label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">vpn_key</span>
                            <input type="text" value="BB-8899-7766" readonly class="w-full bg-surface-container-low border-none rounded-xl pl-12 pr-12 py-3.5 text-primary focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-extrabold tracking-widest cursor-default select-all" />
                            <button type="button" onclick="alert('加入碼已複製！');" class="absolute right-2 top-1/2 -translate-y-1/2 p-2 hover:bg-surface-container-highest active:scale-95 rounded-lg transition-all cursor-pointer text-primary" title="複製加入碼">
                                <span class="material-symbols-outlined text-[20px]">content_copy</span>
                            </button>
                        </div>
                        <p class="text-[10px] text-on-surface-variant/70 pl-1 mt-1 font-medium">* 系統會根據單胎或多胞胎產生專屬代碼</p>
                    </div>
                </div>
            </section>

            <section class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm border border-surface-container-high">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-[20px]">monitor_weight</span>
                    </div>
                    <h2 class="font-headline font-bold text-lg text-primary">出生體徵紀錄</h2>
                </div>

                <div class="grid grid-cols-2 gap-4 gap-y-5">
                    <!-- 出生體重 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生體重</label>
                        <div class="relative">
                            <input type="number" step="0.1" value="3250" placeholder="如 3200" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">g</span>
                        </div>
                    </div>

                    <!-- 出生身長 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生身長</label>
                        <div class="relative">
                            <input type="number" step="0.1" value="51.5" placeholder="如 50.5" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">cm</span>
                        </div>
                    </div>

                    <!-- 出生頭圍 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生頭圍</label>
                        <div class="relative">
                            <input type="number" step="0.1" value="34.0" placeholder="如 34" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">cm</span>
                        </div>
                    </div>

                    <!-- 出生胸圍 -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">出生胸圍</label>
                        <div class="relative">
                            <input type="number" step="0.1" value="32.5" placeholder="如 32" class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium" />
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-on-surface-variant">cm</span>
                        </div>
                    </div>
                </div>

                <div class="mt-5 space-y-2">
                    <label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider pl-1">生產方式</label>
                    <div class="relative">
                        <select class="w-full bg-surface-container-low bg-none border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary-container transition-all text-sm outline-none font-medium appearance-none">
                            <option value="" disabled>請選擇生產方式</option>
                            <option value="自然產" selected>自然產</option>
                            <option value="剖腹產">剖腹產</option>
                            <option value="無痛分娩">無痛分娩自然產</option>
                            <option value="水中生產">水中生產</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Submit Button -->
            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-headline font-bold text-base shadow-[0_10px_20px_rgba(101,81,138,0.2)] hover:scale-[1.02] active:scale-95 transition-all mt-6 cursor-pointer flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">save</span>
                儲存變更
            </button>
        </form>
    </main>
</body>
</html>
