<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>管理胎數與寶寶 - AuraLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#65518a",
                        "primary-container": "#d6beff",
                        "secondary": "#65518a",
                        "background": "#f7f6f3",
                        "surface": "#f7f6f3",
                        "on-surface": "#2e2f2d",
                        "on-surface-variant": "#5b5c5a",
                        "outline": "#767775",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f1f1ee",
                        "surface-container-high": "#e3e3df",
                        "surface-container-highest": "#ddddd9",
                        "error": "#65518a",
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: #f7f6f3; color: #2e2f2d; overflow-x: hidden; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
    <!-- Header Section -->
    <header class="justify-between fixed top-0 w-full z-50 bg-[#f7f6f3]/70 backdrop-blur-md flex items-center px-6 h-16 w-full shadow-sm md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-surface-container-low transition-colors active:scale-95 duration-200 rounded-full cursor-pointer">
                <span class="material-symbols-outlined text-primary">arrow_back</span>
            </button>
            <h1 class="font-headline font-semibold tracking-tight text-lg text-primary">管理胎數與寶寶</h1>
        </div>
        <button onclick="window.location.href='add_pregnancy_baby.html'" class="bg-primary/10 text-primary p-2 rounded-full hover:bg-primary/20 transition-colors cursor-pointer">
            <span class="material-symbols-outlined">add</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="pt-24 px-4 mx-auto max-w-md md:max-w-none w-full space-y-6 md:px-8 lg:px-16 xl:px-32 2xl:px-64">
        
        <!-- Pregnancy Section -->
        <section class="space-y-4">
            <h2 class="text-sm font-bold text-on-surface-variant uppercase tracking-widest px-2">懷孕中</h2>
            <div class="bg-surface-container-lowest rounded-3xl p-4 shadow-sm border border-surface-container-high space-y-3">
                <!-- Pregnancy Item 1 -->
                <div class="flex items-center justify-between p-3 hover:bg-surface-container-low rounded-2xl transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-primary">pregnant_woman</span>
                        </div>
                        <div>
                            <p class="font-bold text-on-surface">第三胎 (目前)</p>
                            <p class="text-xs text-on-surface-variant">預產期：2024-10-22 (24w 4d)</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="window.location.href='edit_pregnancy_case.html'" class="p-2 hover:bg-primary/10 rounded-full text-primary transition-colors cursor-pointer">
                            <span class="material-symbols-outlined text-[20px]">edit</span>
                        </button>
                        <button onclick="if(confirm('確定要刪除嗎？')) alert('已刪除');" class="p-2 hover:bg-primary/10 rounded-full text-primary transition-colors cursor-pointer">
                            <span class="material-symbols-outlined text-[20px]">delete</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Babies Section -->
        <section class="space-y-4">
            <h2 class="text-sm font-bold text-on-surface-variant uppercase tracking-widest px-2">已出生寶寶</h2>
            <div class="bg-surface-container-lowest rounded-3xl p-4 shadow-sm border border-surface-container-high space-y-1">
                <!-- Baby Item 1 -->
                <div class="flex items-center justify-between p-3 hover:bg-surface-container-low rounded-2xl transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center overflow-hidden">
                             <span class="material-symbols-outlined text-primary">face</span>
                        </div>
                        <div>
                            <p class="font-bold text-on-surface">小寶 (第二胎)</p>
                            <p class="text-xs text-on-surface-variant">2023-10-15 (0歲 7個月)</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="window.location.href='edit_baby_profile.html'" class="p-2 hover:bg-primary/10 rounded-full text-primary transition-colors cursor-pointer">
                            <span class="material-symbols-outlined text-[20px]">edit</span>
                        </button>
                        <button onclick="if(confirm('確定要刪除嗎？')) alert('已刪除');" class="p-2 hover:bg-primary/10 rounded-full text-primary transition-colors cursor-pointer">
                            <span class="material-symbols-outlined text-[20px]">delete</span>
                        </button>
                    </div>
                </div>

                <div class="h-px bg-surface-container-highest mx-3"></div>

                <!-- Baby Item 2 -->
                <div class="flex items-center justify-between p-3 hover:bg-surface-container-low rounded-2xl transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center overflow-hidden">
                             <span class="material-symbols-outlined text-primary">face_6</span>
                        </div>
                        <div>
                            <p class="font-bold text-on-surface">大寶 (第一胎)</p>
                            <p class="text-xs text-on-surface-variant">2021-05-20 (3歲 0個月)</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        <button onclick="window.location.href='edit_baby_profile.html'" class="p-2 hover:bg-primary/10 rounded-full text-primary transition-colors cursor-pointer">
                            <span class="material-symbols-outlined text-[20px]">edit</span>
                        </button>
                        <button onclick="if(confirm('確定要刪除嗎？')) alert('已刪除');" class="p-2 hover:bg-primary/10 rounded-full text-primary transition-colors cursor-pointer">
                            <span class="material-symbols-outlined text-[20px]">delete</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>
</body>
</html>
