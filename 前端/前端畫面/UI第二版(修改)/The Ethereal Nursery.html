    <!-- Baby Switcher Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const switcherBtn = document.getElementById('baby-switcher-btn');
            const switcherMenu = document.getElementById('baby-switcher-menu');
            
            if (switcherBtn && switcherMenu) {
                switcherBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isOpen = !switcherMenu.classList.contains('opacity-0');
                    if (isOpen) {
                        switcherMenu.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                        switcherMenu.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                    } else {
                        switcherMenu.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                        switcherMenu.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
                    }
                });

                document.addEventListener('click', (e) => {
                    if (!switcherBtn.contains(e.target) && !switcherMenu.contains(e.target)) {
                        switcherMenu.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                        switcherMenu.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                    }
                });
            }
        });
    </script>
    <!-- Official Checkup Toggle Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('official-toggle');
            const officialFields = document.querySelectorAll('.official-check-field');
            const rightCol = document.getElementById('right-column-fields');
            const leftCol = document.querySelector('.md\\:col-span-12 .md\\:col-span-5') || document.querySelector('.md\\:col-span-5');
            
            if (toggle) {
                toggle.addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    officialFields.forEach(field => {
                        if (isChecked) {
                            field.style.display = '';
                            setTimeout(() => field.style.opacity = '1', 50);
                        } else {
                            field.style.opacity = '0';
                            setTimeout(() => field.style.display = 'none', 300);
                        }
                    });
                    
                    if(leftCol && rightCol) {
                        if (isChecked) {
                            leftCol.classList.remove('md:col-span-12');
                            leftCol.classList.add('md:col-span-5');
                        } else {
                            leftCol.classList.remove('md:col-span-5');
                            leftCol.classList.add('md:col-span-12');
                        }
                    }
                });
            }
        });
    </script>
